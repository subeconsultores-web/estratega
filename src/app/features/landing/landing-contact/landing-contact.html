<section id="contacto"
    class="py-24 relative overflow-hidden bg-slate-50 dark:bg-[#0B0F19] transition-colors duration-500">
    <!-- Decorative background elements -->
    <div
        class="absolute top-0 right-0 w-[800px] h-[800px] bg-indigo-500/10 dark:bg-indigo-600/10 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/3 pointer-events-none">
    </div>
    <div
        class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-emerald-500/10 dark:bg-emerald-600/10 rounded-full blur-[100px] translate-y-1/3 -translate-x-1/3 pointer-events-none">
    </div>

    <div class="container mx-auto px-6 lg:px-12 relative z-10 max-w-7xl">
        <div class="text-center max-w-3xl mx-auto mb-16">
            <h2 class="text-4xl md:text-5xl font-black mb-6 text-slate-900 dark:text-white tracking-tight">
                {{ title }}
            </h2>
            <p class="text-xl text-slate-600 dark:text-slate-400">
                {{ subtitle }}
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-12 items-start">

            <!-- Contact Info -->
            <div class="lg:col-span-2 space-y-6">
                <div *ngFor="let info of contactInfo"
                    class="glass-panel p-6 rounded-2xl flex items-center gap-6 group hover:-translate-y-1 transition-all duration-300">
                    <div
                        class="w-14 h-14 rounded-full bg-indigo-500/10 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 flex items-center justify-center shrink-0 group-hover:bg-indigo-600 group-hover:text-white transition-colors duration-300">
                        <lucide-icon [img]="info.icon" class="w-6 h-6"></lucide-icon>
                    </div>
                    <div>
                        <h4
                            class="text-sm font-semibold text-slate-500 dark:text-slate-400 mb-1 tracking-wider uppercase">
                            {{ info.title }}</h4>
                        <a [href]="info.href"
                            class="text-lg font-medium text-slate-900 dark:text-white hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                            {{ info.value }}
                        </a>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="lg:col-span-3 glass-panel rounded-3xl p-8 md:p-12 relative overflow-hidden">
                <!-- Success Overlay -->
                <div *ngIf="submitSuccess"
                    class="absolute inset-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm z-20 flex flex-col items-center justify-center animate-fade-in">
                    <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center text-white mb-6">
                        <lucide-icon [img]="icons.Send" class="w-10 h-10"></lucide-icon>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">{{ formLabels.success }}</h3>
                </div>

                <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6 relative z-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Name -->
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ formLabels.name
                                }}</label>
                            <input type="text" formControlName="name"
                                class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all dark:text-white placeholder-slate-400"
                                [ngClass]="{'border-red-500': contactForm.get('name')?.invalid && contactForm.get('name')?.touched}">
                        </div>

                        <!-- Company -->
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ formLabels.company
                                }}</label>
                            <input type="text" formControlName="company"
                                class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all dark:text-white placeholder-slate-400">
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ formLabels.email
                            }}</label>
                        <input type="email" formControlName="email"
                            class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all dark:text-white placeholder-slate-400"
                            [ngClass]="{'border-red-500': contactForm.get('email')?.invalid && contactForm.get('email')?.touched}">
                    </div>

                    <!-- Message -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ formLabels.message
                            }}</label>
                        <textarea formControlName="message" rows="4"
                            class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all dark:text-white placeholder-slate-400 resize-none"
                            [ngClass]="{'border-red-500': contactForm.get('message')?.invalid && contactForm.get('message')?.touched}"></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" [disabled]="isSubmitting"
                        class="w-full py-4 px-6 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold flex items-center justify-center gap-2 transition-all disabled:opacity-70 disabled:cursor-not-allowed">
                        <lucide-icon *ngIf="!isSubmitting" [img]="icons.Send" class="w-5 h-5"></lucide-icon>
                        <svg *ngIf="isSubmitting" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        {{ isSubmitting ? formLabels.sending : formLabels.send }}
                    </button>
                </form>
            </div>

        </div>
    </div>
</section>
