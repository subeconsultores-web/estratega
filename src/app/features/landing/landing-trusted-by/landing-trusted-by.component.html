<section class="py-24 relative overflow-hidden bg-slate-50 dark:bg-[#0B0F19] transition-colors duration-300">

    <!-- Content Header -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center mb-16">
        <div @fadeUp>
            <h2
                class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-900 via-indigo-800 to-slate-900 dark:from-white dark:via-indigo-300 dark:to-white sm:text-4xl">
                {{ title }}
            </h2>
            <p class="mt-4 text-lg text-slate-600 dark:text-slate-400 max-w-3xl mx-auto">
                {{ subtitle }}
            </p>
        </div>
    </div>

    <!-- Marquee Container -->
    <div class="relative w-full overflow-hidden whitespace-nowrap py-10 flex">

        <!-- Gradient Masks for smooth fading edges -->
        <div
            class="absolute top-0 left-0 w-32 h-full bg-gradient-to-r from-slate-50 dark:from-[#0B0F19] to-transparent z-10 pointer-events-none">
        </div>
        <div
            class="absolute top-0 right-0 w-32 h-full bg-gradient-to-l from-slate-50 dark:from-[#0B0F19] to-transparent z-10 pointer-events-none">
        </div>

        <!-- Scrolling Track -->
        <div class="flex animate-marquee gap-8 items-center justify-start min-w-full">
            @for (client of clients; track $index) {
            <div
                class="flex-shrink-0 flex items-center gap-4 px-8 py-4 rounded-2xl glass-panel group hover:-translate-y-1 transition-all duration-300 cursor-default">
                <div class="w-12 h-12 rounded-xl {{ client.bg }} flex items-center justify-center">
                    <lucide-icon [img]="client.icon" [class]="client.color + ' w-6 h-6'"></lucide-icon>
                </div>
                <span
                    class="font-semibold text-slate-700 dark:text-slate-300 text-lg group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">
                    {{ client.name }}
                </span>
            </div>
            }
        </div>
    </div>

    <style>
        /* Custom animation for seamless infinite scrolling */
        .animate-marquee {
            animation: marquee 30s linear infinite;
        }

        .animate-marquee:hover {
            animation-play-state: paused;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(calc(-50% - 1rem));
            }

            /* -50% because we duplicated the items */
        }
    </style>

</section>
