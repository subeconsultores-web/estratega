<div class="space-y-8 animate-in slide-in-from-bottom-4 duration-500 relative min-h-[80vh]">
    <!-- Elementos decorativos (Glow) -->
    <div
        class="absolute top-0 right-0 w-[400px] h-[400px] bg-blue-500/10 dark:bg-blue-500/5 rounded-full blur-3xl -z-10 pointer-events-none">
    </div>

    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 relative z-10">
        <div>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-txt-primary mb-2">Proyectos y Tareas</h1>
            <p class="text-txt-muted text-lg">Gestiona la ejecución y tableros operativos de los clientes.</p>
        </div>
        <div class="flex space-x-3">
            <button (click)="nuevoProyecto()" class="btn-primary flex items-center gap-2">
                <lucide-icon name="plus" class="w-5 h-5"></lucide-icon>
                <span>Nuevo Proyecto</span>
            </button>
        </div>
    </div>

    <!-- Contenido Principal -->
    <app-data-table *ngIf="!isLoading && proyectos.length > 0" [data]="proyectos" [columns]="columns"
        (actionClick)="onActionClick($event)">
    </app-data-table>

    <!-- Loading -->
    <div *ngIf="isLoading">
        <app-loading-skeleton></app-loading-skeleton>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && proyectos.length === 0" class="mt-8">
        <app-empty-state icon="folder-plus" title="No hay proyectos activos"
            description="Comienza estructurando tu equipo agrupando requerimientos por clientes debajo de un Proyecto principal."
            actionLabel="Crear Primer Proyecto" actionIcon="plus" (onAction)="nuevoProyecto()">
        </app-empty-state>
    </div>

    <!-- Modal de Nuevo Proyecto -->
    <app-proyecto-form *ngIf="showProyectoModal" (onSave)="guardarProyecto($event)" (onCancel)="cerrarModal()">
    </app-proyecto-form>
</div>
