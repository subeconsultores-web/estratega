<div class="px-4 sm:px-6 lg:px-8 py-8 w-full max-w-9xl mx-auto">
    <div class="sm:flex sm:items-center sm:justify-between mb-8">
        <div class="mb-4 sm:mb-0">
            <h1 class="text-2xl md:text-3xl text-slate-800 dark:text-slate-100 font-bold">Configuración Landing Page
            </h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Configura el texto general de la web pública
                (Hero, Acerca, Misión, Visión).</p>
        </div>
    </div>

    <div *ngIf="isLoading" class="flex justify-center my-12">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500"></div>
    </div>

    <div *ngIf="!isLoading" class="bg-white dark:bg-slate-800 shadow-lg rounded-xl mb-8 p-6">
        <form [formGroup]="configForm" (ngSubmit)="saveConfig()">

            <!-- HERO SECTION -->
            <h2
                class="text-xl font-bold mb-4 text-slate-800 dark:text-slate-100 border-b border-slate-200 dark:border-slate-700 pb-2">
                Sección Hero</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" formGroupName="heroTitle">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Título Principal (ES) *</label>
                    <input formControlName="es" type="text"
                        class="form-input w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Título Principal (EN)</label>
                    <input formControlName="en" type="text"
                        class="form-input w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Título Principal (PT)</label>
                    <input formControlName="pt" type="text"
                        class="form-input w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700" />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8" formGroupName="heroSubtitle">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Subtítulo Hero (ES) *</label>
                    <textarea formControlName="es" rows="3"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Subtítulo Hero (EN)</label>
                    <textarea formControlName="en" rows="3"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Subtítulo Hero (PT)</label>
                    <textarea formControlName="pt" rows="3"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
            </div>

            <!-- ABOUT SECTION -->
            <h2
                class="text-xl font-bold mb-4 text-slate-800 dark:text-slate-100 border-b border-slate-200 dark:border-slate-700 pb-2">
                Acerca de / Historia</h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" formGroupName="aboutTitle">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Título Historia (ES) *</label>
                    <input formControlName="es" type="text"
                        class="form-input w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Título Historia (EN)</label>
                    <input formControlName="en" type="text"
                        class="form-input w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Título Historia (PT)</label>
                    <input formControlName="pt" type="text"
                        class="form-input w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700" />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8" formGroupName="aboutDescription">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Nuestra Historia Completa (ES)
                        *</label>
                    <textarea formControlName="es" rows="6"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Nuestra Historia Completa
                        (EN)</label>
                    <textarea formControlName="en" rows="6"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Nuestra Historia Completa
                        (PT)</label>
                    <textarea formControlName="pt" rows="6"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8" formGroupName="missionText">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Nuestra Misión (ES) *</label>
                    <textarea formControlName="es" rows="4"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Nuestra Misión (EN)</label>
                    <textarea formControlName="en" rows="4"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Nuestra Misión (PT)</label>
                    <textarea formControlName="pt" rows="4"
                        class="form-textarea w-full dark:bg-slate-900 border-slate-200 dark:border-slate-700"></textarea>
                </div>
            </div>

            <!-- BOTONES DE ACCIÓN -->
            <div class="flex justify-end gap-3 pt-6 border-t border-slate-200 dark:border-slate-700">
                <button type="submit" [disabled]="isSaving"
                    class="btn bg-indigo-500 hover:bg-indigo-600 text-white disabled:opacity-50">
                    <span *ngIf="isSaving">Guardando...</span>
                    <span *ngIf="!isSaving">Guardar Cambios</span>
                </button>
            </div>

        </form>
    </div>
</div>
