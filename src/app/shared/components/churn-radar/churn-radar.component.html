<div class="relative w-full h-full min-h-[300px] glass-panel rounded-2xl p-6 flex flex-col items-center justify-center border border-white/5 bg-gradient-to-b"
    [ngClass]="getBgGradient()">

    <!-- Header -->
    <div class="absolute top-4 left-6 z-10 w-full pr-12">
        <h3 class="text-white font-medium flex items-center justify-between">
            <span class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full" [ngClass]="getNeonColor()"></span>
                Riesgo de Abandono (Churn)
            </span>

            <!-- Trend indicator -->
            <span *ngIf="trend === 'up'" class="text-rose-400 text-sm flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-trending-up">
                    <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
                    <polyline points="16 7 22 7 22 13" />
                </svg>
                <span class="ml-1">+5%</span>
            </span>
            <span *ngIf="trend === 'down'" class="text-emerald-400 text-sm flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-trending-down">
                    <polyline points="22 17 13.5 8.5 8.5 13.5 2 7" />
                    <polyline points="16 17 22 17 22 11" />
                </svg>
                <span class="ml-1">-2%</span>
            </span>
        </h3>
    </div>

    <!-- Circular Radar Gauge -->
    <div class="relative w-48 h-48 mt-8 flex items-center justify-center">

        <!-- Outer Glow Rings -->
        <div class="absolute inset-0 rounded-full border border-dashed opacity-20 animate-spin-slow"
            [class.border-cyan-400]="riskLevel==='low'" [class.border-amber-400]="riskLevel==='medium'"
            [class.border-rose-400]="riskLevel==='high'"></div>
        <div class="absolute inset-2 rounded-full border border-white/10"></div>

        <!-- Radial progress simulation -->
        <svg class="absolute inset-0 w-full h-full transform -rotate-90">
            <circle cx="96" cy="96" r="80" fill="none" class="stroke-slate-800" stroke-width="12"></circle>
            <circle cx="96" cy="96" r="80" fill="none"
                [attr.stroke]="riskLevel === 'low' ? '#34d399' : riskLevel === 'medium' ? '#fbbf24' : '#f43f5e'"
                stroke-width="12" stroke-linecap="round" [style.stroke-dasharray]="502"
                [style.stroke-dashoffset]="502 - (502 * displayScore) / 100"
                class="transition-all duration-300 ease-out" style="filter: drop-shadow(0 0 8px currentColor);">
            </circle>
        </svg>

        <!-- Center Metric -->
        <div class="relative z-10 flex flex-col items-center justify-center rounded-full bg-slate-900/80 w-32 h-32 backdrop-blur-sm border shadow-lg"
            [ngClass]="getNeonColor()">
            <span class="text-4xl font-light tracking-tighter tabular-nums"
                [ngClass]="{'text-emerald-400': riskLevel==='low', 'text-amber-400': riskLevel==='medium', 'text-rose-400': riskLevel==='high'}">
                {{displayScore}}<span class="text-xl">%</span>
            </span>
            <span class="text-xs uppercase tracking-widest text-slate-400 mt-1 font-semibold">
                {{riskLevel === 'low' ? 'Seguro' : riskLevel === 'medium' ? 'Atención' : 'Crítico'}}
            </span>
        </div>
    </div>

    <!-- Footer description -->
    <div class="mt-8 text-center px-4">
        <p class="text-xs text-slate-400">
            Probabilidad calculada procesando <span class="text-slate-200">2.4M</span> puntos de datos en los últimos 30
            días mediante modelo de Nodos Ocultos.
        </p>
    </div>
</div>
